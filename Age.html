<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حاسبة العمر المتقدمة</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(135deg, #141E30, #243B55);
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    padding: 30px;
    border-radius: 20px;
    width: 95%;
    max-width: 420px;
    text-align: center;
}

select, input, button {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

button {
    background: #00c6ff;
    color: #000;
    font-size: 18px;
    cursor: pointer;
}

button:hover {
    background: #00a2cc;
}

.result {
    margin-top: 20px;
    padding: 15px;
    border-radius: 15px;
    background: rgba(0,0,0,0.3);
}

.box {
    margin: 10px 0;
}
</style>
</head>

<body>

<div class="container">
    <h2>📅 حاسبة العمر</h2>

    <select id="type" onchange="toggleInputs()">
        <option value="gregorian">📅 ميلادي</option>
        <option value="hijri">🌙 هجري</option>
    </select>

    <!-- ميلادي -->
    <input type="date" id="gregorianInput">

    <!-- هجري -->
    <input type="number" id="hYear" placeholder="السنة الهجرية" style="display:none;">
    <input type="number" id="hMonth" placeholder="الشهر (1-12)" style="display:none;">
    <input type="number" id="hDay" placeholder="اليوم (1-30)" style="display:none;">

    <button onclick="calculate()">احسب العمر</button>

    <div class="result" id="result" style="display:none;">
        <div class="box" id="gResult"></div>
        <div class="box" id="hResult"></div>
    </div>
</div>

<script>
function toggleInputs() {
    const type = document.getElementById("type").value;

    document.getElementById("gregorianInput").style.display = (type === "gregorian") ? "block" : "none";

    document.getElementById("hYear").style.display =
    document.getElementById("hMonth").style.display =
    document.getElementById("hDay").style.display =
        (type === "hijri") ? "block" : "none";
}

// تحويل هجري إلى ميلادي (تقريبي)
function hijriToGregorian(hy, hm, hd) {
    let days = (hy - 1) * 354 + Math.floor((3 + (11 * hy)) / 30) + (hm - 1) * 29 + hd;
    let date = new Date(622, 6, 16); // بداية التقويم الهجري
    date.setDate(date.getDate() + days);
    return date;
}

function calculate() {
    let type = document.getElementById("type").value;
    let birth;

    if (type === "gregorian") {
        let val = document.getElementById("gregorianInput").value;
        if (!val) return alert("اختر التاريخ");
        birth = new Date(val);
    } else {
        let y = parseInt(document.getElementById("hYear").value);
        let m = parseInt(document.getElementById("hMonth").value);
        let d = parseInt(document.getElementById("hDay").value);

        if (!y || !m || !d) return alert("أدخل التاريخ الهجري كامل");
        birth = hijriToGregorian(y, m, d);
    }

    let today = new Date();

    let years = today.getFullYear() - birth.getFullYear();
    let months = today.getMonth() - birth.getMonth();
    let days = today.getDate() - birth.getDate();

    if (days < 0) {
        months--;
        days += new Date(today.getFullYear(), today.getMonth(), 0).getDate();
    }

    if (months < 0) {
        years--;
        months += 12;
    }

    document.getElementById("gResult").innerHTML =
        "📘 العمر الميلادي:<br>" +
        years + " سنة، " + months + " شهر، " + days + " يوم";

    // هجري تقريبي
    let totalDays = (today - birth) / (1000 * 60 * 60 * 24);
    let hy = Math.floor(totalDays / 354.367);
    let rm = totalDays % 354.367;
    let hm = Math.floor(rm / 29.53);
    let hd = Math.floor(rm % 29.53);

    document.getElementById("hResult").innerHTML =
        "🌙 العمر الهجري:<br>" +
        hy + " سنة، " + hm + " شهر، " + hd + " يوم";

    document.getElementById("result").style.display = "block";
}
</script>

</body>
</html>
